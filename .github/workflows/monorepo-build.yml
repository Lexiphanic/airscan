name: Monorepo Build

on:
  push:
    branches: [main]
    tags: ['*']
    paths:
      - 'backends/**'
      - 'frontends/**'
      - 'packages/**'
      - '.github/workflows/monorepo-build.yml'
      - '.devcontainer/**'
  pull_request:
    paths:
      - 'backends/**'
      - 'frontends/**'
      - 'packages/**'
      - '.github/workflows/monorepo-build.yml'
      - '.devcontainer/**'

jobs:
  build-container:
    name: Build DevContainer
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      containerName: ${{ steps.config.outputs.containerName }}
      containerTag: ${{ steps.config.outputs.containerTag }}
      containerCache: ${{ steps.config.outputs.containerCache }}
    steps:
      - name: Config
        id: config
        run: |
          echo "containerName=ghcr.io/${GITHUB_REPOSITORY,,}" >> $GITHUB_OUTPUT
          echo "containerTag=${{ github.sha }}" >> $GITHUB_OUTPUT
          echo "containerCache=ghcr.io/${GITHUB_REPOSITORY,,}:${{ github.sha }}" >> $GITHUB_OUTPUT
      - uses: actions/checkout@v6
      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push devcontainer image
        uses: devcontainers/ci@v0.3.1900000417
        with:
          imageName: ${{ steps.config.outputs.containerName }}
          cacheFrom: ${{ steps.config.outputs.containerCache }}
          imageTag: ${{ steps.config.outputs.containerTag }}${{ github.ref == 'refs/heads/main' && ',latest' || '' }}
          push: always
          runCmd: echo "Image built"

  build-backends-mock:
    name: Build @airscan/backend-mock
    runs-on: ubuntu-latest
    needs: build-container
    permissions:
      contents: read
      packages: read
    if: ${{ github.event_name == 'push' || contains(github.event.pull_request.labels.*.name, 'backend-mock') || github.event_name == 'pull_request' }}
    env:
      PACKAGE_DIR: backends/mock
      ARTIFACT_NAME: airscan-mock
      IMAGE_NAME: ${{ needs.build-container.outputs.containerName }}
      CACHE_FROM: ${{ needs.build-container.outputs.containerCache }}
      IMAGE_TAG: ${{ needs.build-container.outputs.containerTag }}
    steps:
      - uses: actions/checkout@v6
      - name: Build package
        uses: ./.github/actions/build-package
        with:
          package-dir: ${{ env.PACKAGE_DIR }}
          artifact-name: ${{ env.ARTIFACT_NAME }}
          artifact-path: ${{ env.PACKAGE_DIR }}/dist/*
          image-name: ${{ env.IMAGE_NAME }}
          cache-from: ${{ env.CACHE_FROM }}
          image-tag: ${{ env.IMAGE_TAG }}
          token: ${{ secrets.GITHUB_TOKEN }}
          run-cmd: |
            bun install --frozen-lockfile
            bun run lint
            bun run build

  build-backends-tshark:
    name: Build @airscan/backend-tshark
    runs-on: ubuntu-latest
    needs: build-container
    permissions:
      contents: read
      packages: read
    if: ${{ github.event_name == 'push' || contains(github.event.pull_request.labels.*.name, 'backend-tshark') || github.event_name == 'pull_request' }}
    env:
      PACKAGE_DIR: backends/tshark
      ARTIFACT_NAME: airscan-tshark
      IMAGE_NAME: ${{ needs.build-container.outputs.containerName }}
      CACHE_FROM: ${{ needs.build-container.outputs.containerCache }}
      IMAGE_TAG: ${{ needs.build-container.outputs.containerTag }}
    steps:
      - uses: actions/checkout@v6
      - name: Build package
        uses: ./.github/actions/build-package
        with:
          package-dir: ${{ env.PACKAGE_DIR }}
          artifact-name: ${{ env.ARTIFACT_NAME }}
          artifact-path: ${{ env.PACKAGE_DIR }}/dist/*
          image-name: ${{ env.IMAGE_NAME }}
          cache-from: ${{ env.CACHE_FROM }}
          image-tag: ${{ env.IMAGE_TAG }}
          token: ${{ secrets.GITHUB_TOKEN }}
          run-cmd: |
            bun install --frozen-lockfile
            bun run lint
            bun run build

  build-backends-windows:
    name: Build @airscan/backend-windows
    runs-on: ubuntu-latest
    needs: build-container
    permissions:
      contents: read
      packages: read
    if: ${{ github.event_name == 'push' || contains(github.event.pull_request.labels.*.name, 'backend-windows') || github.event_name == 'pull_request' }}
    env:
      PACKAGE_DIR: backends/windows
      ARTIFACT_NAME: airscan-windows
      IMAGE_NAME: ${{ needs.build-container.outputs.containerName }}
      CACHE_FROM: ${{ needs.build-container.outputs.containerCache }}
      IMAGE_TAG: ${{ needs.build-container.outputs.containerTag }}
    steps:
      - uses: actions/checkout@v6
      - name: Build package
        uses: ./.github/actions/build-package
        with:
          package-dir: ${{ env.PACKAGE_DIR }}
          artifact-name: ${{ env.ARTIFACT_NAME }}
          artifact-path: ${{ env.PACKAGE_DIR }}/dist/*
          image-name: ${{ env.IMAGE_NAME }}
          cache-from: ${{ env.CACHE_FROM }}
          image-tag: ${{ env.IMAGE_TAG }}
          token: ${{ secrets.GITHUB_TOKEN }}
          run-cmd: |
            bun install --frozen-lockfile
            bun run lint
            bun run build

  build-backends-bw16:
    name: Build @airscan/backend-bw16
    runs-on: ubuntu-latest
    needs: build-container
    permissions:
      contents: read
      packages: read
    if: ${{ github.event_name == 'push' || contains(github.event.pull_request.labels.*.name, 'backend-bw16') || github.event_name == 'pull_request' }}
    env:
      PACKAGE_DIR: backends/bw16
      ARTIFACT_NAME: airscan-bw16
      IMAGE_NAME: ${{ needs.build-container.outputs.containerName }}
      CACHE_FROM: ${{ needs.build-container.outputs.containerCache }}
      IMAGE_TAG: ${{ needs.build-container.outputs.containerTag }}
    steps:
      - uses: actions/checkout@v6
      - name: Build package
        uses: ./.github/actions/build-package
        with:
          package-dir: ${{ env.PACKAGE_DIR }}
          artifact-name: ${{ env.ARTIFACT_NAME }}
          artifact-path: ${{ env.PACKAGE_DIR }}/dist/*.bin
          image-name: ${{ env.IMAGE_NAME }}
          cache-from: ${{ env.CACHE_FROM }}
          image-tag: ${{ env.IMAGE_TAG }}
          token: ${{ secrets.GITHUB_TOKEN }}
          run-cmd: |
            bun install --frozen-lockfile
            bun run build

  build-frontends-web:
    name: Build @airscan/frontend-web
    runs-on: ubuntu-latest
    needs: build-container
    permissions:
      contents: read
      packages: read
    if: ${{ github.event_name == 'push' || contains(github.event.pull_request.labels.*.name, 'frontend-web') || github.event_name == 'pull_request' }}
    env:
      PACKAGE_DIR: frontends/web
      ARTIFACT_NAME: airscan-web
      IMAGE_NAME: ${{ needs.build-container.outputs.containerName }}
      CACHE_FROM: ${{ needs.build-container.outputs.containerCache }}
      IMAGE_TAG: ${{ needs.build-container.outputs.containerTag }}
    steps:
      - uses: actions/checkout@v6
      - name: Build package
        uses: ./.github/actions/build-package
        with:
          package-dir: ${{ env.PACKAGE_DIR }}
          artifact-name: ${{ env.ARTIFACT_NAME }}
          artifact-path: ${{ env.PACKAGE_DIR }}/dist/*
          image-name: ${{ env.IMAGE_NAME }}
          cache-from: ${{ env.CACHE_FROM }}
          image-tag: ${{ env.IMAGE_TAG }}
          token: ${{ secrets.GITHUB_TOKEN }}
          run-cmd: |
            bun install --frozen-lockfile
            bun run lint
            bun run build

  build-packages-engine:
    name: Build @airscan/engine
    runs-on: ubuntu-latest
    needs: build-container
    permissions:
      contents: read
      packages: read
    if: ${{ github.event_name == 'push' || contains(github.event.pull_request.labels.*.name, 'package-engine') || github.event_name == 'pull_request' }}
    env:
      PACKAGE_DIR: packages/engine
      ARTIFACT_NAME: airscan-engine
      IMAGE_NAME: ${{ needs.build-container.outputs.containerName }}
      CACHE_FROM: ${{ needs.build-container.outputs.containerCache }}
      IMAGE_TAG: ${{ needs.build-container.outputs.containerTag }}
    steps:
      - uses: actions/checkout@v6
      - name: Build package
        uses: ./.github/actions/build-package
        with:
          package-dir: ${{ env.PACKAGE_DIR }}
          artifact-name: ${{ env.ARTIFACT_NAME }}
          artifact-path: ${{ env.PACKAGE_DIR }}/dist/*
          image-name: ${{ env.IMAGE_NAME }}
          cache-from: ${{ env.CACHE_FROM }}
          image-tag: ${{ env.IMAGE_TAG }}
          token: ${{ secrets.GITHUB_TOKEN }}
          run-cmd: |
            bun install --frozen-lockfile
            bun run lint

  build-packages-types:
    name: Build @airscan/types
    runs-on: ubuntu-latest
    needs: build-container
    permissions:
      contents: read
      packages: read
    if: ${{ github.event_name == 'push' || contains(github.event.pull_request.labels.*.name, 'package-types') || github.event_name == 'pull_request' }}
    env:
      PACKAGE_DIR: packages/types
      ARTIFACT_NAME: airscan-types
      IMAGE_NAME: ${{ needs.build-container.outputs.containerName }}
      CACHE_FROM: ${{ needs.build-container.outputs.containerCache }}
      IMAGE_TAG: ${{ needs.build-container.outputs.containerTag }}
    steps:
      - uses: actions/checkout@v6
      - name: Build package
        uses: ./.github/actions/build-package
        with:
          package-dir: ${{ env.PACKAGE_DIR }}
          artifact-name: ${{ env.ARTIFACT_NAME }}
          artifact-path: ${{ env.PACKAGE_DIR }}/dist/*
          image-name: ${{ env.IMAGE_NAME }}
          cache-from: ${{ env.CACHE_FROM }}
          image-tag: ${{ env.IMAGE_TAG }}
          token: ${{ secrets.GITHUB_TOKEN }}
          run-cmd: |
            bun install --frozen-lockfile
            bun run lint

  build-packages-websockets:
    name: Build @airscan/websockets
    runs-on: ubuntu-latest
    needs: build-container
    permissions:
      contents: read
      packages: read
    if: ${{ github.event_name == 'push' || contains(github.event.pull_request.labels.*.name, 'package-websockets') || github.event_name == 'pull_request' }}
    env:
      PACKAGE_DIR: packages/websockets
      ARTIFACT_NAME: airscan-websockets
      IMAGE_NAME: ${{ needs.build-container.outputs.containerName }}
      CACHE_FROM: ${{ needs.build-container.outputs.containerCache }}
      IMAGE_TAG: ${{ needs.build-container.outputs.containerTag }}
    steps:
      - uses: actions/checkout@v6
      - name: Build package
        uses: ./.github/actions/build-package
        with:
          package-dir: ${{ env.PACKAGE_DIR }}
          artifact-name: ${{ env.ARTIFACT_NAME }}
          artifact-path: ${{ env.PACKAGE_DIR }}/dist/*
          image-name: ${{ env.IMAGE_NAME }}
          cache-from: ${{ env.CACHE_FROM }}
          image-tag: ${{ env.IMAGE_TAG }}
          token: ${{ secrets.GITHUB_TOKEN }}
          run-cmd: |
            bun install --frozen-lockfile
            bun run lint

  test-e2e:
    name: Test E2E
    runs-on: ubuntu-latest
    needs: [build-container, build-backends-tshark, build-backends-mock, build-backends-windows, build-backends-bw16, build-frontends-web, build-packages-engine, build-packages-types, build-packages-websockets]
    permissions:
      contents: read
      pull-requests: write
    env:
      IMAGE_NAME: ${{ needs.build-container.outputs.containerName }}
      CACHE_FROM: ${{ needs.build-container.outputs.containerCache }}
      IMAGE_TAG: ${{ needs.build-container.outputs.containerTag }}
    steps:
      - uses: actions/checkout@v6
      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Download frontend artifact
        uses: actions/download-artifact@v6
        with:
          name: airscan-web
          path: frontends/web/dist
      - name: Run in devcontainer
        uses: devcontainers/ci@v0.3.1900000417
        with:
          imageName: ${{ env.IMAGE_NAME }}
          cacheFrom: ${{ env.CACHE_FROM }}
          imageTag: ${{ env.IMAGE_TAG }}
          push: never
          runCmd: |
            cd frontends/web
            bun install --frozen-lockfile
            bun run install:playwright
            bun run test:e2e
      - id: test-e2e-evidence
        name: Upload video artifact
        uses: actions/upload-artifact@v7
        with:
          name: test-e2e-smoke.webm
          path: frontends/web/test-results/**/video.webm
          archive: false
      - name: Comment on PR with video link
        uses: actions/github-script@v9
        if: success() && github.event_name == 'pull_request'
        env:
          ARTIFACT_URL: ${{ steps.test-e2e-evidence.outputs.artifact-url }}
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `E2E test passed! Video recording available as an artifact: [test-e2e-smoke.webm](${process.env.ARTIFACT_URL})`
            });

  release:
    name: Create Releases
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    needs: [build-container, build-backends-tshark, build-backends-mock, build-backends-windows, build-backends-bw16, build-frontends-web, build-packages-engine, build-packages-types, build-packages-websockets]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all artifacts
        run: |
          mkdir -p artifacts
          for artifact in airscan-tshark airscan-windows airscan-bw16 airscan-web airscan-engine airscan-types airscan-websockets; do
            if gh run download --name $artifact --dir artifacts 2>/dev/null; then
              echo "Downloaded $artifact"
            fi
          done
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: Airscan ${{ github.ref_name }}
          files: artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  cleanup-container-image:
    name: Delete DevContainer Image
    runs-on: ubuntu-latest
    needs: [build-container, test-e2e, release]
    permissions:
      contents: read
      packages: write
    if: ${{ always() && !(github.event_name == 'push' && github.ref == 'refs/heads/main') }}
    env:
      IMAGE_TAG: ${{ needs.build-container.outputs.containerTag }}
      REPO_OWNER: ${{ github.repository_owner }}
      REPO_NAME: ${{ github.event.repository.name }}
    steps:
      - name: Get package version ID
        id: get-version-id
        run: |
          # Fetch package versions and find the ID matching our image tag
          RESPONSE=$(curl -s -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/users/${{ env.REPO_OWNER }}/packages/container/${{ env.REPO_NAME }}/versions?per_page=100")
          VERSION_ID=$(echo "$RESPONSE" | jq -r --arg tag "${{ env.IMAGE_TAG }}" '.[] | select(.metadata.container.tags[] == $tag) | .id')
          if [ -z "$VERSION_ID" ] || [ "$VERSION_ID" = "null" ]; then
            echo "Package version not found for tag ${{ env.IMAGE_TAG }}, skipping deletion"
            exit 0
          fi
          echo "version_id=$VERSION_ID" >> $GITHUB_OUTPUT
      - name: Delete GHCR version
        if: steps.get-version-id.outputs.version_id != ''
        uses: actions/delete-package-versions@v5
        with:
          owner: ${{ env.REPO_OWNER }}
          package-name: ${{ env.REPO_NAME }}
          package-type: container
          package-version-ids: ${{ steps.get-version-id.outputs.version_id }}
          token: ${{ secrets.GITHUB_TOKEN }}