name: 'Build package in devcontainer'
description: 'Build a monorepo package using devcontainer and upload artifact'

inputs:
  package-dir:
    description: 'Directory of the package to build'
    required: true
  artifact-name:
    description: 'Name of the artifact to upload'
    required: true
  run-cmd:
    description: 'Command to run inside the package directory'
    required: true
  artifact-path:
    description: 'Path pattern for artifact files relative to repository root'
    required: true
  image-name:
    description: 'DevContainer image name'
    required: true
  cache-from:
    description: 'Cache from image tag'
    required: true
  image-tag:
    description: 'Image tag to use'
    required: true
  token:
    description: Repository Auth Token
    required: false

runs:
  using: composite
  steps:
    - name: Login to GHCR
      if: ${{ inputs.token }}
      uses: docker/login-action@v4
      with:
        registry: ghcr.io
        username: ${{ github.repository_owner }}
        password: ${{ inputs.token }}
    - name: Run in devcontainer
      uses: devcontainers/ci@v0.3.1900000417
      with:
        imageName: ${{ inputs.image-name }}
        cacheFrom: ${{ inputs.cache-from }}
        imageTag: ${{ inputs.image-tag }}
        push: never
        runCmd: |
          cd ${{ inputs.package-dir }}
          ${{ inputs.run-cmd }}

    - name: Upload artifact
      uses: actions/upload-artifact@v6
      with:
        name: ${{ inputs.artifact-name }}
        path: ${{ inputs.artifact-path }}